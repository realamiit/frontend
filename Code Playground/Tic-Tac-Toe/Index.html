<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe Game</title>
    <link rel="stylesheet" href="Style.css">
</head>
<body>
    <div class="msg-container">
        <p id="msg"></p>
        <button type="button" id="new-btn">New Game</button>
    </div>
    <main>
    <h1>Tic-Tac-Toe</h1>
    <div class="container">
        <div class="game">
            <button type="button" class="box" aria-label="Game box 1"></button>
            <button type="button" class="box" aria-label="Game box 2"></button>
            <button type="button" class="box" aria-label="Game box 3"></button>
            <button type="button" class="box" aria-label="Game box 4"></button>
            <button type="button" class="box" aria-label="Game box 5"></button>
            <button type="button" class="box" aria-label="Game box 6"></button>
            <button type="button" class="box" aria-label="Game box 7"></button>
            <button type="button" class="box" aria-label="Game box 8"></button>
            <button type="button" class="box" aria-label="Game box 9"></button>
        </div>
    </div>
    <button type="button" id="reset">Reset Game</button>
    </main>
 <script src="App.js"></script>
</body>
</html>
